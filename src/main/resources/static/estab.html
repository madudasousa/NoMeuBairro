<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estabelecimento</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="estabelecimento-page">
    <main class="page estabelecimento">
      <header class="home-header" onclick="window.location.href='home.html'"
              style="cursor:pointer;">
        <div class="brand">
          <div class="brand__icon">
            <img src="img/logo.png" alt="NoMeuBairro" class="brand__logo" />
          </div>
          <div class="brand__text">
            <h1 class="brand__title">NoMeuBairro</h1>
            <p class="brand__subtitle">Conectando você ao comercios locais</p>
          </div>
        </div>
      </header>
      <nav class="nav-arrows">
        <button class="nav-arrow" id="btnVoltar" onclick="history.back()"
                style="display:none">&#8592; </button>
        <button class="nav-arrow" id="btnAvancar" onclick="history.forward()"
                style="display:none">&#8594;</button>
      </nav>

      <script>
        // Voltar: mostra se veio de alguma página anterior
        if (document.referrer) {
          document.getElementById("btnVoltar").style.display = "inline-block";
        }
        // Avançar: mostra se o usuário já voltou e tem página para avançar
        window.addEventListener("load", () => {
          if (history.length > 1) {
            document.getElementById("btnAvancar").style.display = "inline-block";
          }
        });
      </script>

      <section class="card estabelecimento-card">
        <div class="title-bar">
          <h1 id="storeName">Nome do Estabelecimento</h1>
        </div>
        <p class="store-desc" id="storeDesc">Descrição do estabelecimento.</p>
        <h2 class="section-title">Serviços Oferecidos:</h2>
        <div class="service-tags" id="serviceTags"></div>

        <!-- Carrossel / Galeria -->
        <h2 class="section-title">Imagens:</h2>

        <div class="carousel">
          <button class="carousel-btn prev" id="prevBtn" type="button">
            &#10094;
          </button>

          <div class="carousel-track-wrapper">
            <div class="carousel-track" id="carouselTrack"></div>
          </div>

          <button class="carousel-btn next" id="nextBtn" type="button">
            &#10095;
          </button>
        </div>

        <!-- Localização -->
        <h2 class="section-title">Localização:</h2>

        <a id="mapLink" class="map-link" target="_blank" rel="noopener">
          <div class="map-preview">
            <iframe
              id="mapFrame"
              class="map-frame"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              src="https://www.google.com/maps?q=S%C3%A3o%20Paulo&output=embed"
            >
            </iframe>
          </div>
        </a>

        <!-- WhatsApp -->
        <a id="whatsBtn" class="whatsapp-btn" target="_blank" rel="noopener">
          <div class="brand__icon">
            <img src="/img/whatsapp-icon.png" class="whatsapp-icon" />
          </div>
          Entrar em contato via WhatsApp
        </a>
      </section>
    </main>

    <!-- WhatsApp flutuante -->
    <a id="floatingWhatsBtn" class="floating-whatsapp-btn" target="_blank" rel="noopener" style="display: none;">
      <img src="/img/whatsapp-icon.png" alt="WhatsApp" />
    </a>

    <!-- Modal da galeria -->
    <div class="gallery-modal" id="galleryModal">
      <button class="gallery-modal__close" id="closeModalBtn" type="button">
        &times;
      </button>
      <button
        class="gallery-modal__nav gallery-modal__nav--prev"
        id="modalPrevBtn"
        type="button"
      >
        &#10094;
      </button>

      <div class="gallery-modal__content">
        <img id="modalImage" src="" alt="Imagem ampliada do estabelecimento" />
      </div>

      <button
        class="gallery-modal__nav gallery-modal__nav--next"
        id="modalNextBtn"
        type="button"
      >
        &#10095;
      </button>
    </div>

    <script src="/estab.js"></script>
  </body>
</html>
